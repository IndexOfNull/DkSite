{{ define "main" }}
<div>
    <h1 class="post-title">Project: {{ .Title }}</h1>
    <div class="post-metadata">
        {{ partial "metadata.html" . }}
        {{ with .Params.authors }}
        <i data-feather="users"></i>
        Co-authors: {{ delimit . ", " }}
        {{ end }}
    </div>
</div>
<br>
<div class="project-body-container">
    {{ .Content }}
</div>
<p class="top-return-button"><a href="#">Back to top</a></p>
{{ end }}
