{{ define "main" }}

<div class="project-header">
    <p class="project-breadcrumb"><a href="{{ absURL "projects/" }}">← Projects</a></p>
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-metadata">
        <span class="meta-date">{{ .PublishDate.Format "Jan 2, 2006" }}</span>
        {{ with .Params.tags }}
        <span class="meta-tags">
            {{ range . }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </span>
        {{ end }}
        {{ with .Params.authors }}
        <span class="meta-authors">with {{ delimit . ", " }}</span>
        {{ end }}
    </div>
</div>

<div class="project-body-container">
    {{ .Content }}
</div>

<div class="project-footer">
    <a href="{{ absURL "projects/" }}" class="back-link">← Back to Projects</a>
</div>

{{ end }}
